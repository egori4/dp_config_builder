---
- name: Delete HTTPS Flood Profiles on Radware Devices
  hosts: cc
  gather_facts: no
  vars_files:
    - ../vars/cc.yml
    - ../vars/delete_http_vars.yml

  vars:
    # Cartesian product of devices × profiles
    profile_matrix: "{{ dp_ip | product(https_profiles) | list }}"

  tasks:

    - name: Lock all devices
      dp_lock:
        provider: "{{ cc }}"
        dp_ip: "{{ item }}"
      loop: "{{ dp_ip }}"
      loop_control:
        label: "{{ item }}"

    - name: Delete HTTPS Flood profiles from all devices
      delete_http_profile:
        provider: "{{ cc }}"
        dp_ip: "{{ item.0 }}"
        name: "{{ item.1.name }}"
      loop: "{{ profile_matrix }}"
      loop_control:
        label: "{{ item.0 }}/{{ item.1.name }}"
      register: https_profile_delete_results
      failed_when: >
        https_profile_delete_results is failed and
        ('not found' not in (https_profile_delete_results.msg | default('')))

    - name: Unlock all devices
      dp_unlock:
        provider: "{{ cc }}"
        dp_ip: "{{ item }}"
      loop: "{{ dp_ip }}"
      loop_control:
        label: "{{ item }}"
